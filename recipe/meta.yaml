{% set name = "lightly" %}
{% set version = "1.5.22" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/lightly-{{ version }}.tar.gz
  sha256: 7bb8939976ea5e8fabb20d049812700d51e44f6461f15510a784afd1252a3dbd

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.6
    - pip
    - setuptools >=21
    - setuptools-scm
  run:
    - python >=3.6
    - certifi >=14.05.14
    - hydra-core >=1.0.0
    - lightly-utils >=0.0.0,<0.1.dev0
    - numpy >=1.18.1
    - python-dateutil >=2.5.3
    - requests >=2.23.0
    - six >=1.10
    - tqdm >=4.44
    - urllib3 >=1.25.3
    - pydantic >=1.10.5
    - aenum >=3.1.11
    - pytorch
    - torchvision
    - pytorch-lightning >=1.0.4

test:
  imports:
    - lightly
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/lightly-ai/lightly
  summary: A deep learning package for self-supervised learning
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - IgorSusmelj
    - MalteEbner
    - philippmwirth
    - guarin
